<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS - Title Slide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #000000;
            position: relative;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #FFFFFF;
        }
        
        /* Scanline effect */
        .slide-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 2px,
                rgba(0, 255, 255, 0.03) 4px
            );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
            z-index: 1;
        }
        
        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }
        
        /* Chromatic aberration effect */
        .title-main {
            position: absolute;
            left: 60px;
            top: 150px;
            z-index: 2;
        }
        
        .title-text {
            font-size: 72px;
            font-weight: bold;
            line-height: 1.2;
            letter-spacing: 2px;
            color: #FFFFFF;
            text-shadow: 
                3px 0 0 #00FFFF,
                -3px 0 0 #FF00FF;
            margin-bottom: 20px;
        }
        
        .bracket-left {
            display: inline-block;
            color: #00FFFF;
            font-size: 48px;
            margin-right: 10px;
        }
        
        .bracket-right {
            display: inline-block;
            color: #FF00FF;
            font-size: 48px;
            margin-left: 10px;
        }
        
        /* Subtitle and info section */
        .info-section {
            position: absolute;
            right: 60px;
            top: 200px;
            z-index: 2;
            max-width: 500px;
            text-align: right;
        }
        
        .subtitle {
            font-size: 28px;
            color: #00FFFF;
            margin-bottom: 40px;
            letter-spacing: 1px;
            line-height: 1.4;
        }
        
        .course-info {
            font-size: 18px;
            color: #FFFFFF;
            margin-bottom: 15px;
            border-top: 2px solid #FF00FF;
            padding-top: 20px;
        }
        
        .course-line {
            margin-bottom: 10px;
        }
        
        .label {
            color: #00FFFF;
            display: inline-block;
            width: 80px;
        }
        
        .value {
            color: #FFFFFF;
        }
        
        /* Bottom date */
        .date-footer {
            position: absolute;
            bottom: 40px;
            left: 60px;
            z-index: 2;
            font-size: 16px;
            color: #FF00FF;
            letter-spacing: 1px;
        }
        
        /* Geometric accent lines */
        .accent-line-1 {
            position: absolute;
            width: 300px;
            height: 2px;
            background: linear-gradient(90deg, #00FFFF, transparent);
            top: 120px;
            left: 0;
            z-index: 2;
        }
        
        .accent-line-2 {
            position: absolute;
            width: 2px;
            height: 400px;
            background: linear-gradient(180deg, #FF00FF, transparent);
            right: 0;
            top: 160px;
            z-index: 2;
        }
        
        /* Digital noise effect */
        .noise {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter><rect width="100" height="100" fill="rgba(0,255,255,0.02)" filter="url(%23noise)" /></svg>');
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
        }
        
        /* Corner brackets */
        .corner-bracket {
            position: absolute;
            font-size: 40px;
            z-index: 2;
        }
        
        .corner-tl {
            top: 20px;
            left: 20px;
            color: #00FFFF;
        }
        
        .corner-tr {
            top: 20px;
            right: 20px;
            color: #FF00FF;
        }
        
        .corner-bl {
            bottom: 20px;
            left: 20px;
            color: #FF00FF;
        }
        
        .corner-br {
            bottom: 20px;
            right: 20px;
            color: #00FFFF;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="noise"></div>
        
        <!-- Corner brackets -->
        <div class="corner-bracket corner-tl">[</div>
        <div class="corner-bracket corner-tr">]</div>
        <div class="corner-bracket corner-bl">]</div>
        <div class="corner-bracket corner-br">[</div>
        
        <!-- Accent lines -->
        <div class="accent-line-1"></div>
        <div class="accent-line-2"></div>
        
        <!-- Main title -->
        <div class="title-main">
            <div class="title-text">
                <span class="bracket-left">[</span>TARS<span class="bracket-right">]</span>
            </div>
            <div style="font-size: 20px; color: #00FFFF; letter-spacing: 1px;">
                TERRORIST ATTACK RESPONSE SYSTEM
            </div>
        </div>
        
        <!-- Info section -->
        <div class="info-section">
            <div class="subtitle">
                Decentralized Multi-Agent System with Finite State Machines
            </div>
            
            <div class="course-info">
                <div class="course-line">
                    <span class="label">COURSE:</span>
                    <span class="value">DCIT 403</span>
                </div>
                <div class="course-line">
                    <span class="label">TOPIC:</span>
                    <span class="value">Intelligent Agents</span>
                </div>
                <div class="course-line">
                    <span class="label">LAB:</span>
                    <span class="value">Lab 3</span>
                </div>
                <div class="course-line">
                    <span class="label">FOCUS:</span>
                    <span class="value">Goals, Events, Reactive Behavior</span>
                </div>
            </div>
        </div>
        
        <!-- Date footer -->
        <div class="date-footer">
            [DATE: 2026-02-21] [VERSION: 1.0]
        </div>
    </div>
</body>
</html>
